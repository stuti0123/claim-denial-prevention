version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claimops-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./models:/app/models       # model artifacts persisted
      - ./data:/app/data           # bronze/silver/gold CSVs
      - ./claimops.db:/app/claimops.db  # SQLite database file
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: claimops-ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    restart: unless-stopped
